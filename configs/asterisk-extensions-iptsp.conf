; ═══════════════════════════════════════════════════════════════════
;  IPTSP Asterisk Extensions (Dialplan) Configuration
;  Bangladesh + India Routing with Extensions
; ═══════════════════════════════════════════════════════════════════

[general]
static=yes
writeprotect=no
autofallthrough=yes

[globals]
; WireGuard IPs
BD_WG_IP=10.100.0.2
IN_WG_IP=10.200.0.2
OVH_WG_IP=10.0.0.1

; SBC details (India)
SBC_IP=100.64.216.4
SBC_DOMAIN=100.65.166.6
SBC_USER=+914223532220

; ───────────────────────────────────────────────────────────────────
;  DEFAULT CONTEXT (Internal Extensions)
; ───────────────────────────────────────────────────────────────────

[default]
; Extensions can call each other
exten => _2XXX,1,NoOp(Internal Extension Call)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

exten => _3XXX,1,NoOp(India Extension Call)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; ── Extension calling Bangladesh numbers ──
exten => _01XXXXXXXXX,1,NoOp(Local BD call from extension)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN}@bangladesh-inbound,60)
 same => n,Hangup()

exten => _+8801X.,1,NoOp(BD with +880 from extension)
 same => n,Dial(PJSIP/${EXTEN:4}@bangladesh-inbound,60)
 same => n,Hangup()

; ── Extension calling India numbers ──
exten => _0091X.,1,NoOp(India International from extension)
 same => n,Dial(PJSIP/${EXTEN:4}@india-trunk-endpoint,60)
 same => n,Hangup()

exten => _+91X.,1,NoOp(India with +91 from extension)
 same => n,Dial(PJSIP/${EXTEN:1}@india-trunk-endpoint,60)
 same => n,Hangup()

; ── Extension calling Pakistan ──
exten => _0092X.,1,NoOp(Pakistan International)
 same => n,Dial(PJSIP/${EXTEN:4}@india-trunk-endpoint,60)
 same => n,Hangup()

; ── Extension calling World ──
exten => _00X.,1,NoOp(World International)
 same => n,Dial(PJSIP/${EXTEN}@india-trunk-endpoint,60)
 same => n,Hangup()

exten => _+X.,1,NoOp(World with +)
 same => n,Dial(PJSIP/${EXTEN:1}@india-trunk-endpoint,60)
 same => n,Hangup()

; Echo test
exten => 9999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ───────────────────────────────────────────────────────────────────
;  BANGLADESH INBOUND CONTEXT
;  Handles incoming calls from Bangladesh numbers/carriers
; ───────────────────────────────────────────────────────────────────

[bangladesh-inbound]
; ── Route to internal extensions ──
exten => _2XXX,1,NoOp(Route to BD Extension)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; ── Route to India (0091) ──
exten => _0091X.,1,NoOp(BD → India International)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN:4}@india-trunk-endpoint,60,tr)
 same => n,Hangup()

; ── Route to India (+91) ──
exten => _+91X.,1,NoOp(BD → India with +91)
 same => n,Dial(PJSIP/${EXTEN:1}@india-trunk-endpoint,60,tr)
 same => n,Hangup()

; ── Route to Pakistan (0092) ──
exten => _0092X.,1,NoOp(BD → Pakistan)
 same => n,Dial(PJSIP/${EXTEN:4}@india-trunk-endpoint,60,tr)
 same => n,Hangup()

; ── Route to World (00 country code) ──
exten => _00Z.,1,NoOp(BD → World via India trunk)
 same => n,Dial(PJSIP/${EXTEN}@india-trunk-endpoint,60,tr)
 same => n,Hangup()

exten => _+Z.,1,NoOp(BD → World with +)
 same => n,Dial(PJSIP/${EXTEN:1}@india-trunk-endpoint,60,tr)
 same => n,Hangup()

; ── Local Bangladesh routing ──
exten => _01X.,1,NoOp(Local BD)
 same => n,Dial(PJSIP/${EXTEN}@default,30)
 same => n,Hangup()

exten => _+8801X.,1,NoOp(Local BD with +880)
 same => n,Dial(PJSIP/${EXTEN:4}@default,30)
 same => n,Hangup()

; ───────────────────────────────────────────────────────────────────
;  INDIA OUTBOUND CONTEXT
;  Handles calls from India trunk to Bangladesh
; ───────────────────────────────────────────────────────────────────

[india-outbound]
; ── Route to Bangladesh (00880) ──
exten => _008801X.,1,NoOp(IN → Bangladesh International)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN:5}@bangladesh-inbound,60,tr)
 same => n,Hangup()

; ── Route to Bangladesh (+880) ──
exten => _+8801X.,1,NoOp(IN → Bangladesh with +880)
 same => n,Dial(PJSIP/${EXTEN:4}@bangladesh-inbound,60,tr)
 same => n,Hangup()

; ── Route to Bangladesh Extensions ──
exten => _2XXX,1,NoOp(IN → BD Extension)
 same => n,Dial(PJSIP/${EXTEN}@default,30)
 same => n,Hangup()

; ── India Local calls ──
exten => _0X.,1,NoOp(IN Local)
 same => n,Dial(PJSIP/${EXTEN}@india-trunk-endpoint,60)
 same => n,Hangup()

; ───────────────────────────────────────────────────────────────────
;  HANGUP HANDLER
; ───────────────────────────────────────────────────────────────────

[hangup]
exten => h,1,NoOp(Hangup)
 same => n,Hangup()

; ───────────────────────────────────────────────────────────────────
;  DIALPLAN PATTERNS REFERENCE
; ───────────────────────────────────────────────────────────────────
;
;  _X.     = Match any number (X = any digit, . = any more digits)
;  _01X.   = Bangladesh local (01XXXXXXXXX)
;  _0091X. = India from BD (0091XXXXXXXXXX)
;  _008801X. = BD from India (008801XXXXXXXXX)
;  _0092X. = Pakistan
;  _00Z.   = Any international (Z = 1-9, not 0)
;  _+X.    = Any number with +
;  _+91X.  = India with +91 prefix
;  _+8801X. = Bangladesh with +880 prefix
;  _2XXX   = Internal extensions (2000-2999)
;
;  Dial flags:
;  tr = Allow transfer + ring tone
;  T = Allow transfer
;  r = Play ring tone to caller
;
; ───────────────────────────────────────────────────────────────────
