; ═══════════════════════════════════════════════════════════════════
;  IPTSP Asterisk PJSIP Configuration
;  Bangladesh Side - WireGuard Connected via OVH Relay
; ═══════════════════════════════════════════════════════════════════

[global]
type=global
endpoint_identifier_order=ip,username,anonymous
max_forwards=70
user_agent=IPTSP-Asterisk-BD

; ───────────────────────────────────────────────────────────────────
;  Transports - Listen on ALL interfaces
; ───────────────────────────────────────────────────────────────────

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080
; External address = OVH public IP (for SDP)
external_media_address=OVH_PUBLIC_IP
external_signaling_address=OVH_PUBLIC_IP

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ───────────────────────────────────────────────────────────────────
;  Endpoint Templates
; ───────────────────────────────────────────────────────────────────

[endpoint-bangladesh](!)
type=endpoint
context=bangladesh-inbound
disallow=all
allow=ulaw
allow=alaw
allow=gsm
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
qualify_frequency=60
dtmf_mode=rfc2833
ice_support=no

[endpoint-india-trunk](!)
type=endpoint
context=india-outbound
disallow=all
allow=g729
allow=ulaw
allow=alaw
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
qualify_frequency=60
dtmf_mode=rfc2833

[endpoint-extension](!)
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
allow=gsm
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
dtmf_mode=rfc2833

[auth-basic](!)
type=auth
auth_type=userpass

[aor-dynamic](!)
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=60
qualify_timeout=3

; ───────────────────────────────────────────────────────────────────
;  INDIA SIP TRUNK (via WireGuard to OVH)
; ───────────────────────────────────────────────────────────────────
;  Traffic flow: Asterisk → wg0(10.100.0.2) → OVH(10.0.0.1)
;  → DNAT to wg1(10.200.0.2:5060) → LAN → SBC(100.64.216.4)

[india-trunk-auth](auth-basic)
username=+914223532220
password=<INDIA_TRUNK_PASSWORD>

[india-trunk-aor](aor-dynamic)
; Contact via WireGuard - India client IP
contact=sip:10.200.0.2:5060
qualify_frequency=30

[india-trunk-endpoint](endpoint-india-trunk)
auth=india-trunk-auth
aors=india-trunk-aor
from_domain=100.65.166.6
; Outbound proxy via WireGuard
outbound_proxy=sip:10.200.0.2:5060

[india-trunk-identify]
type=identify
endpoint=india-trunk-endpoint
match=10.200.0.2

; ───────────────────────────────────────────────────────────────────
;  BANGLADESH IPTSP / BDIX (if local carrier provides SIP)
; ───────────────────────────────────────────────────────────────────

[bd-iptsp-auth](auth-basic)
username=<BD_IPTSP_USERNAME>
password=<BD_IPTSP_PASSWORD>

[bd-iptsp-aor](aor-dynamic)
contact=sip:<BD_IPTSP_IP>:5060

[bd-iptsp-endpoint](endpoint-bangladesh)
auth=bd-iptsp-auth
aors=bd-iptsp-aor

; ───────────────────────────────────────────────────────────────────
;  EXTENSIONS (Internal Staff Numbers)
; ───────────────────────────────────────────────────────────────────

; Extension 2001 - Office Desk 1
[ext-2001](endpoint-extension)
auth=auth-2001
aors=aor-2001
callerid="Office 1" <2001>

[auth-2001](auth-basic)
username=2001
password=<EXT_2001_PASSWORD>

[aor-2001](aor-dynamic)
mailboxes=2001@default

; Extension 2002 - Office Desk 2
[ext-2002](endpoint-extension)
auth=auth-2002
aors=aor-2002
callerid="Office 2" <2002>

[auth-2002](auth-basic)
username=2002
password=<EXT_2002_PASSWORD>

[aor-2002](aor-dynamic)
mailboxes=2002@default

; ───────────────────────────────────────────────────────────────────
;  REGISTRATION (Outbound to carriers)
; ───────────────────────────────────────────────────────────────────

; Register to India Trunk
[register-india]
type=registration
transport=transport-udp
outbound_auth=india-trunk-auth
server_uri=sip:100.65.166.6:5060
client_uri=sip:+914223532220@100.65.166.6:5060
contact_header=sip:+914223532220@OVH_PUBLIC_IP:5080
retry_interval=60
forbidden_interval=3600
expiration=3600
