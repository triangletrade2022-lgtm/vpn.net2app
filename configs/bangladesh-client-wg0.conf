# ═══════════════════════════════════════════════════════════════════
#  BANGLADESH CLIENT - WireGuard Configuration
#  Connects to OVH Cloud Relay
# ═══════════════════════════════════════════════════════════════════
#  
#  Architecture (Bangladesh Side):
#  
#   ┌─────────────────────────────────────────────────────────────┐
#   │  Bangladesh Office (No Real IP - Behind NAT/ISP CGNAT)      │
#   │                                                              │
#   │  ┌──────────────┐     ┌──────────────┐     ┌──────────────┐ │
#   │  │  SIP Phone   │────→│   Asterisk   │────→│  WireGuard   │ │
#   │  │  (Internal)  │     │  192.168.1.x │     │   wg0        │ │
#   │  │              │     │  Port: 5080  │     │  10.100.0.2  │ │
#   │  └──────────────┘     └──────────────┘     └──────┬───────┘ │
#   │                                                    │         │
#   └────────────────────────────────────────────────────┼─────────┘
#                                                        │
#                                          WireGuard     │
#                                          Encrypted     │
#                                          Tunnel        │
#                                                        ▼
#                                             ┌──────────────────┐
#                                             │   OVH Cloud      │
#                                             │  51.xxx.xxx.xxx  │
#                                             │  Port: 51820     │
#                                             │  10.0.0.1        │
#                                             └──────────────────┘
#
# ============================================================
#  HOW TRAFFIC FLOWS:
# ============================================================
#  
#  OUTBOUND:  Bangladesh → World
#  SIP Phone → Asterisk (192.168.1.x:5080) → wg0 (10.100.0.2) 
#  → OVH (10.0.0.1) → OVH public IP → BDIX/IPTSP → PSTN
#
#  INBOUND:   World → Bangladesh
#  Caller → BDIX/IPTSP → OVH public IP:5080 
#  → DNAT to 10.100.0.2:5080 → Asterisk → SIP Phone
#
# ============================================================
#  SETUP STEPS (Bangladesh):
# ============================================================
#  1. apt-get install wireguard -y
#  2. wg genkey | tee /etc/wireguard/private.key | wg pubkey > /etc/wireguard/public.key
#  3. cat /etc/wireguard/public.key → Share with OVH admin
#  4. cat /etc/wireguard/private.key → Put in <BD_CLIENT_PRIVATE_KEY> below
#  5. Get OVH public key from OVH admin → Put in <OVH_SERVER_PUBLIC_KEY> below
#  6. Get OVH real public IP → Replace 51.xxx.xxx.xxx
#  7. Save this file as /etc/wireguard/wg0.conf
#  8. wg-quick up wg0 && systemctl enable wg-quick@wg0
#  9. Test: ping 10.0.0.1 (OVH), ping 10.200.0.2 (India)
# ============================================================

[Interface]
# Bangladesh Private Key (GENERATE YOURS: wg genkey)
PrivateKey = <BD_CLIENT_PRIVATE_KEY>

# Bangladesh WireGuard IP (in OVH subnet)
Address = 10.100.0.2/24

# DNS (optional - use Google DNS)
DNS = 8.8.8.8, 8.8.4.4

# MTU for better performance
MTU = 1420

# Optional: Enable NAT on BD side
PostUp = iptables -t nat -A POSTROUTING -o wg0 -j MASQUERADE
PostDown = iptables -t nat -D POSTROUTING -o wg0 -j MASQUERADE

[Peer]
# OVH Cloud Relay Server Public Key
PublicKey = <OVH_SERVER_PUBLIC_KEY>

# OVH Server Real Public IP and WireGuard Port
Endpoint = 51.xxx.xxx.xxx:51820

# Route ALL traffic through VPN (or specific subnets only)
# Use 0.0.0.0/0 for full tunnel
# Use specific subnets for split tunnel
AllowedIPs = 0.0.0.0/0

# Keep tunnel alive behind NAT/CGNAT
PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
#  IMPORTANT CONFIGURATION NOTES:
# ───────────────────────────────────────────────────────────────
#
#  1. Asterisk must listen on ALL interfaces for SIP:
#     In pjsip.conf:
#     bind=0.0.0.0:5080
#
#  2. Asterisk RTP settings:
#     rtp.conf:
#     rtpstart=10000
#     rtpend=20000
#
#  3. SIP Phones connect to Asterisk INTERNAL IP:
#     e.g., 192.168.1.100:5080
#
#  4. External callers reach your Asterisk via:
#     OVH_PUBLIC_IP:5080 → DNAT → 10.100.0.2:5080 → Asterisk
#
#  5. To reach India SBC from Bangladesh:
#     sip.conf peer:
#     [india-trunk]
#     host=10.200.0.2
#     port=5060
#
#  6. BDIX/IP TSP peer should point to:
#     OVH_PUBLIC_IP:5080
#     (OVH will DNAT to 10.100.0.2:5080)
#
# ───────────────────────────────────────────────────────────────
