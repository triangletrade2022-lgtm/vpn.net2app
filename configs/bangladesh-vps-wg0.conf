# ═══════════════════════════════════════════════════════════════════
#  BANGLADESH VPS SERVER — WireGuard Configuration
#  VPS Public IP: 103.51.128.9 (can change if needed)
#  Save as: /etc/wireguard/wg0.conf
#  Run: wg-quick up wg0 && systemctl enable wg-quick@wg0
# ═══════════════════════════════════════════════════════════════════
#
#  ARCHITECTURE:
#  ┌─────────────────────────────────────────────────────────────┐
#  │  Bangladesh VPS (103.51.128.9)                              │
#  │  ┌──────────────┐  ┌──────────────┐  ┌──────────────┐      │
#  │  │  WireGuard   │  │   Asterisk   │  │   IPTSP      │      │
#  │  │  wg0         │  │   5080/udp   │  │  180.210...  │      │
#  │  │  10.100.0.1  │  │   SIP Peer   │  │  Carrier     │      │
#  │  └──────┬───────┘  └──────┬───────┘  └──────┬───────┘      │
#  │         │                 │                  │               │
#  └─────────┼─────────────────┼──────────────────┼───────────────┘
#            │                 │                  │
#     ┌──────┴──────┐   ┌──────┴──────┐   ┌──────┴──────────────┐
#     │ OVH Client   │   │ SIP Phones  │   │ IPTSP Carrier       │
#     │ 10.0.0.2     │   │ 10.100.0.x  │   │ 180.210.187.253    │
#     └──────────────┘   └─────────────┘   └─────────────────────┘
#
# ============================================================
#  SETUP STEPS ON VPS (103.51.128.9):
# ============================================================
#  1. apt-get update && apt-get install -y wireguard wireguard-tools
#  2. cd /etc/wireguard && wg genkey | tee private.key | wg pubkey > public.key
#  3. cat public.key — SHARE THIS WITH ALL CLIENTS
#  4. Save this file as /etc/wireguard/wg0.conf
#  5. Replace <BD_VPS_PRIVATE_KEY> with: cat /etc/wireguard/private.key
#  6. Replace all <CLIENT_PUBLIC_KEY> placeholders
#  7. chmod 600 /etc/wireguard/wg0.conf
#  8. wg-quick up wg0 && systemctl enable wg-quick@wg0
#  9. Open port 51820/udp on firewall:
#     iptables -I INPUT -p udp --dport 51820 -j ACCEPT
#     (Also in VPS panel security group)
# ============================================================

[Interface]
# ⚠️ REPLACE with: cat /etc/wireguard/private.key
PrivateKey = <BD_VPS_PRIVATE_KEY>

# WireGuard internal IP
Address = 10.100.0.1/24

# WireGuard listen port (OPEN THIS ON VPS FIREWALL!)
ListenPort = 51820

# Enable IP forwarding for SIP traffic
PostUp = sysctl -w net.ipv4.ip_forward=1
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT
PostUp = iptables -A FORWARD -o wg0 -j ACCEPT
PostUp = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

# Forward SIP port 5080 from VPS public IP to local Asterisk
PostUp = iptables -t nat -A PREROUTING -i eth0 -p udp --dport 5080 -j DNAT --to-destination 127.0.0.1:5080

# Forward RTP range
PostUp = iptables -t nat -A PREROUTING -i eth0 -p udp --dport 10000:20000 -j DNAT --to-destination 127.0.0.1

# Cleanup
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT
PostDown = iptables -D FORWARD -o wg0 -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -t nat -D PREROUTING -i eth0 -p udp --dport 5080 -j DNAT --to-destination 127.0.0.1:5080
PostDown = iptables -t nat -D PREROUTING -i eth0 -p udp --dport 10000:20000 -j DNAT --to-destination 127.0.0.1

SaveConfig = true
MTU = 1420

# ───────────────────────────────────────────────────────────────
#  PEER: OVH Cloud Relay
# ───────────────────────────────────────────────────────────────
[Peer]
# OVH Cloud Server — provides public IP relay
PublicKey = <OVH_PUBLIC_KEY>
AllowedIPs = 10.0.0.0/24
Endpoint = OVH_REAL_IP:51820
PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
#  PEER: India Office Client
# ───────────────────────────────────────────────────────────────
[Peer]
# India Office — connects through BD VPS to reach IPTSP
PublicKey = <INDIA_CLIENT_PUBLIC_KEY>
AllowedIPs = 10.200.0.2/32, 10.200.0.0/24
PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
#  PEER: Admin/Management Client
# ───────────────────────────────────────────────────────────────
[Peer]
# Admin laptop / management device
PublicKey = <ADMIN_CLIENT_PUBLIC_KEY>
AllowedIPs = 10.100.0.10/32
PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
#  ADD MORE SIP PHONE PEERS BELOW (10.100.0.20 - 10.100.0.254)
# ───────────────────────────────────────────────────────────────
# [Peer]
# PublicKey = <PHONE_PUBLIC_KEY>
# AllowedIPs = 10.100.0.20/32
# PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
#  IMPORTANT NOTES:
# ───────────────────────────────────────────────────────────────
#  1. Open port 51820/udp on VPS firewall AND in cloud panel
#  2. Open port 5080/udp for SIP
#  3. Asterisk should listen on 0.0.0.0:5080
#  4. IPTSP carrier peer: host=180.210.187.253, port=5080
#  5. All clients get Bangladesh IP (103.51.128.9) through tunnel
# ───────────────────────────────────────────────────────────────
