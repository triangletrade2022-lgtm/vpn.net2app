# ═══════════════════════════════════════════════════════════════════
#  CLIENT — WireGuard Config to Connect to Bangladesh VPS
#  VPS: 103.51.128.9:51820
#  Save as: /etc/wireguard/wg0.conf
#  Run: wg-quick up wg0
# ═══════════════════════════════════════════════════════════════════
#
#  WHAT THIS DOES:
#  After connecting, ALL your traffic routes through Bangladesh VPS.
#  Your IP becomes 103.51.128.9 (Bangladesh IP).
#  SIP calls will connect to IPTSP carrier at 180.210.187.253:5080.
#
#  TRAFFIC FLOW:
#  Your Device → WireGuard Tunnel → BD VPS (103.51.128.9)
#  → Asterisk (10.100.0.1:5080) → IPTSP (180.210.187.253) → PSTN
#
# ============================================================
#  SETUP STEPS:
# ============================================================
#  1. Install WireGuard:
#     apt-get install -y wireguard wireguard-tools    (Linux)
#     brew install wireguard-tools                     (Mac)
#     Download WireGuard app                           (Windows/Android/iOS)
#
#  2. Generate your keys:
#     wg genkey | tee private.key | wg pubkey > public.key
#     cat public.key → SHARE THIS WITH VPS ADMIN
#
#  3. Get the VPS public key from admin
#
#  4. Save this file as /etc/wireguard/wg0.conf
#     Replace <CLIENT_PRIVATE_KEY> with your private key
#     Replace <BD_VPS_PUBLIC_KEY> with VPS public key
#     Replace 10.100.0.X with your assigned IP
#
#  5. Connect:
#     wg-quick up wg0
#     systemctl enable wg-quick@wg0  (auto-start)
#
#  6. Test:
#     ping 10.100.0.1          (VPS)
#     ping 180.210.187.253     (IPTSP SIP Server)
#     curl ifconfig.me          (should show 103.51.128.9)
#
#  7. Configure SIP Phone:
#     SIP Server: 180.210.187.253:5080
#     Username: 09648472999 (or your assigned number)
#     Password: (your password)
#     Transport: UDP
# ============================================================

[Interface]
# ⚠️ REPLACE with your generated private key
PrivateKey = <CLIENT_PRIVATE_KEY>

# ⚠️ REPLACE X with your assigned number (e.g. 20, 21, 22...)
Address = 10.100.0.X/24

# DNS servers
DNS = 8.8.8.8, 8.8.4.4

# MTU for WireGuard overhead
MTU = 1420

[Peer]
# ⚠️ REPLACE with VPS public key (from VPS admin)
PublicKey = <BD_VPS_PUBLIC_KEY>

# Bangladesh VPS — REAL IP
Endpoint = 103.51.128.9:51820

# Route ALL traffic through the tunnel (gets Bangladesh IP)
# For split tunnel, change to: 10.100.0.0/24, 180.210.187.253/32
AllowedIPs = 0.0.0.0/0

# Keep connection alive behind NAT
PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
