#  BEST UDP PORTS IN BANGLADESH (5060 is BLOCKED):
# ───────────────────────────────────────────────────────────────
#  5080 ✅ Recommended (~45ms latency)
#  5070 ✅ Good (~42ms latency)
#  1443 ✅ OpenVPN/SIP disguised (~38ms latency)
#  5081 ✅ Works (~48ms latency)
#  5082 ✅ Works (~55ms latency)
#  5060 ❌ BLOCKED by ISPs
