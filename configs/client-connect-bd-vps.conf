#  SIP Phone Settings:
#  ┌─────────────────────────────────────────┐
#  │ Server:   180.210.187.253               │
#  │ Port:     5080                          │
#  │ Username: 09648472999                   │
#  │ Password: 09648472999999                │
#  │ Transport: UDP                          │
#  │ Codec:    ulaw, alaw, gsm               │
#  └─────────────────────────────────────────┘
#
