; ═══════════════════════════════════════════════════════════════════
;  Asterisk Dialplan — IPTSP Bangladesh + India Routing
;  VPS: 103.51.128.9 | Autodetect & Connect to: 180.210.187.253
; ═══════════════════════════════════════════════════════════════════

[general]
static=yes
writeprotect=no
autofallthrough=yes

[globals]
IPTSP_SIP=180.210.187.253
IPTSP_PORT=5080
IPTSP_USER=09648472999
BD_VPS_IP=103.51.128.9
SBC_IP=100.64.216.4
SBC_DOMAIN=100.65.166.6

; ═══════════════════════════════════════════════════════════════════
;  DEFAULT — Internal Extensions
; ═══════════════════════════════════════════════════════════════════

[default]
; Extensions call each other
exten => _2XXX,1,NoOp(Internal Extension Call)
 same => n,Dial(SIP/${EXTEN},30)
 same => n,Hangup()

; Extensions call Bangladesh local
exten => _01XXXXXXXXX,1,NoOp(BD Local from Extension)
 same => n,Set(CALLERID(num)=${IPTSP_USER})
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

; Extensions call Bangladesh mobile
exten => _013XXXXXXXX,1,NoOp(BD Mobile from Extension)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

exten => _014XXXXXXXX,1,NoOp(BD Mobile)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

exten => _015XXXXXXXX,1,NoOp(BD Mobile)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

exten => _016XXXXXXXX,1,NoOp(BD Mobile)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

exten => _017XXXXXXXX,1,NoOp(BD Mobile)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

exten => _018XXXXXXXX,1,NoOp(BD Mobile)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

exten => _019XXXXXXXX,1,NoOp(BD Mobile)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

; ── India calls from extensions ──
exten => _0091X.,1,NoOp(India International)
 same => n,Dial(SIP/${EXTEN:4}@india-trunk,60,tr)
 same => n,Hangup()

exten => _+91X.,1,NoOp(India with +91)
 same => n,Dial(SIP/${EXTEN:1}@india-trunk,60,tr)
 same => n,Hangup()

; ── Pakistan calls from extensions ──
exten => _0092X.,1,NoOp(Pakistan International)
 same => n,Dial(SIP/${EXTEN:4}@india-trunk,60,tr)
 same => n,Hangup()

; ── World calls from extensions ──
exten => _00Z.,1,NoOp(World International)
 same => n,Dial(SIP/${EXTEN}@india-trunk,60,tr)
 same => n,Hangup()

exten => _+Z.,1,NoOp(World with +)
 same => n,Dial(SIP/${EXTEN:1}@india-trunk,60,tr)
 same => n,Hangup()

; Echo test
exten => 9999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ═══════════════════════════════════════════════════════════════════
;  IPTSP INBOUND — Calls from BD IPTSP Carrier
; ═══════════════════════════════════════════════════════════════════

[iptsp-inbound]
; Route to internal extensions
exten => _2XXX,1,NoOp(Route to Extension)
 same => n,Dial(SIP/${EXTEN},30)
 same => n,Hangup()

; Route to India
exten => _0091X.,1,NoOp(BD→India via IPTSP)
 same => n,Dial(SIP/${EXTEN:4}@india-trunk,60,tr)
 same => n,Hangup()

exten => _+91X.,1,NoOp(BD→India +91)
 same => n,Dial(SIP/${EXTEN:1}@india-trunk,60,tr)
 same => n,Hangup()

; Route to Pakistan
exten => _0092X.,1,NoOp(BD→Pakistan)
 same => n,Dial(SIP/${EXTEN:4}@india-trunk,60,tr)
 same => n,Hangup()

; Route to World
exten => _00Z.,1,NoOp(BD→World)
 same => n,Dial(SIP/${EXTEN}@india-trunk,60,tr)
 same => n,Hangup()

; Local Bangladesh (via IPTSP)
exten => _01X.,1,NoOp(Local BD via IPTSP)
 same => n,Dial(SIP/${EXTEN}@bd-iptsp-carrier,60)
 same => n,Hangup()

; ═══════════════════════════════════════════════════════════════════
;  INDIA OUTBOUND — Calls from India Trunk
; ═══════════════════════════════════════════════════════════════════

[india-outbound]
; Route to Bangladesh
exten => _008801X.,1,NoOp(IN→Bangladesh)
 same => n,Dial(SIP/${EXTEN:5}@bd-iptsp-carrier,60,tr)
 same => n,Hangup()

exten => _+8801X.,1,NoOp(IN→Bangladesh +880)
 same => n,Dial(SIP/${EXTEN:4}@bd-iptsp-carrier,60,tr)
 same => n,Hangup()

; Route to Bangladesh extensions
exten => _2XXX,1,NoOp(IN→BD Extension)
 same => n,Dial(SIP/${EXTEN},30)
 same => n,Hangup()

; India local via trunk
exten => _0X.,1,NoOp(India Local)
 same => n,Dial(SIP/${EXTEN}@india-trunk,60)
 same => n,Hangup()

; Hangup handler
exten => h,1,NoOp(Hangup)
 same => n,Hangup()
