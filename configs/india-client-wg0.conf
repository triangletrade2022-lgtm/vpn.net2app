# ═══════════════════════════════════════════════════════════════════
#  INDIA CLIENT - WireGuard Configuration
#  Connects to OVH Cloud Relay
# ═══════════════════════════════════════════════════════════════════
#  
#  Architecture (India Side):
#  
#   ┌─────────────────────────────────────────────────────────────┐
#   │  India Office (No Real IP - Behind NAT)                     │
#   │                                                              │
#   │  ┌──────────────┐     ┌──────────────┐     ┌──────────────┐ │
#   │  │  SBC              │────→│ LAN Switch   │────→│  WireGuard   │ │
#   │  │  100.64.216.4 │     │  (Internal)  │     │   wg0        │ │
#   │  │  Port: 5060   │     │              │     │  10.200.0.2  │ │
#   │  └──────────────┘     └──────────────┘     └──────┬───────┘ │
#   │                                                    │         │
#   └────────────────────────────────────────────────────┼─────────┘
#                                                        │
#                                          WireGuard     │
#                                          Encrypted     │
#                                          Tunnel        │
#                                                        ▼
#                                             ┌──────────────────┐
#                                             │   OVH Cloud      │
#                                             │  51.xxx.xxx.xxx  │
#                                             │  Port: 51820     │
#                                             │  10.0.0.1        │
#                                             └──────────────────┘
#
# ============================================================
#  HOW TRAFFIC FLOWS:
# ============================================================
#  
#  OUTBOUND:  India → Bangladesh
#  Caller → India PSTN → SBC (100.64.216.4) → LAN → wg0 (10.200.0.2)
#  → OVH (10.0.0.1) → DNAT to 10.100.0.2:5080 → BD Asterisk → BD Phone
#
#  INBOUND:   Bangladesh → India
#  BD Phone → BD Asterisk → wg0 → OVH public IP:5060
#  → DNAT to 10.200.0.2:5060 → LAN → SBC (100.64.216.4) → India PSTN
#
#  SIP TRUNK DETAILS:
#  Type: peer
#  Host: 100.64.216.4
#  From Domain: 100.65.166.6
#  Default User: +914223532220
#  Port: 5060
#  Context: from-trunk
#
# ============================================================
#  SETUP STEPS (India):
# ============================================================
#  1. apt-get install wireguard -y
#  2. wg genkey | tee /etc/wireguard/private.key | wg pubkey > /etc/wireguard/public.key
#  3. cat /etc/wireguard/public.key → Share with OVH admin
#  4. cat /etc/wireguard/private.key → Put in <IN_CLIENT_PRIVATE_KEY> below
#  5. Get OVH public key from OVH admin → Put in <OVH_SERVER_PUBLIC_KEY> below
#  6. Get OVH real public IP → Replace 51.xxx.xxx.xxx
#  7. Save this file as /etc/wireguard/wg0.conf
#  8. wg-quick up wg0 && systemctl enable wg-quick@wg0
#  9. Test: ping 10.0.0.1 (OVH), ping 10.100.0.2 (Bangladesh)
# ============================================================

[Interface]
# India Private Key (GENERATE YOURS: wg genkey)
PrivateKey = <IN_CLIENT_PRIVATE_KEY>

# India WireGuard IP (in OVH subnet)
Address = 10.200.0.2/24

# DNS
DNS = 8.8.8.8, 8.8.4.4

# MTU for better performance
MTU = 1420

# Enable routing for LAN/SBC subnet
PostUp = iptables -t nat -A POSTROUTING -o wg0 -j MASQUERADE
PostUp = iptables -A FORWARD -i eth0 -o wg0 -j ACCEPT
PostUp = iptables -A FORWARD -i wg0 -o eth0 -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o wg0 -j MASQUERADE
PostDown = iptables -D FORWARD -i eth0 -o wg0 -j ACCEPT
PostDown = iptables -D FORWARD -i wg0 -o eth0 -j ACCEPT

[Peer]
# OVH Cloud Relay Server Public Key
PublicKey = <OVH_SERVER_PUBLIC_KEY>

# OVH Server Real Public IP and WireGuard Port
Endpoint = 51.xxx.xxx.xxx:51820

# Route ALL traffic through VPN
AllowedIPs = 0.0.0.0/0

# Keep tunnel alive behind NAT
PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
#  IMPORTANT: India SIP Trunk Configuration
# ───────────────────────────────────────────────────────────────
#
#  SBC Details (provided by Indian Telecom):
#  SBC IP:      100.64.216.4
#  SBC Port:    5060
#  From Domain: 100.65.166.6
#  Default User: +914223532220
#  Auth User:   +914223532220
#  Password:    (provided by carrier)
#
#  Asterisk SIP Peer Config for India Trunk:
#  [india-trunk]
#  type=peer
#  host=100.64.216.4          ← SBC IP (on LAN)
#  port=5060
#  nat=yes
#  insecure=invite,port
#  fromdomain=100.65.166.6
#  dtmfmode=rfc2833
#  disallow=all
#  allow=g729
#  allow=ulaw
#  allow=alaw
#  context=india-outbound
#  defaultuser=+914223532220
#  canreinvite=no
#  directmedia=no
#
#  SIP URI: sip:+914223532220@100.65.166.6
#
#  Dialplan patterns:
#  X.          → Match any number
#  0 0091 X.   → International format
#
#  To reach Bangladesh from India (over WireGuard):
#  In extensions.conf:
#  exten => _008801X.,1,Dial(PJSIP/${EXTEN:5}@10.100.0.2:5080)
#  exten => _+8801X.,1,Dial(PJSIP/${EXTEN:4}@10.100.0.2:5080)
#
# ───────────────────────────────────────────────────────────────
