# ═══════════════════════════════════════════════════════════════════
#  OVH CLOUD SERVER - WireGuard Configuration
#  Central Relay for Bangladesh ↔ India SIP Traffic
# ═══════════════════════════════════════════════════════════════════
#  
#  Architecture:
#  
#   OVH Cloud (Real Public IP: 51.xxx.xxx.xxx)
#   ┌─────────────────────────────────────────────┐
#   │  wg0: 10.0.0.1/24  Port: 51820             │
#   │                                              │
#   │  ┌─────────────────────────────────────────┐ │
#   │  │ iptables DNAT Rules:                    │ │
#   │  │  :5080 → 10.100.0.2:5080 (BD SIP)      │ │
#   │  │  :5060 → 10.200.0.2:5060 (IN SIP)      │ │
#   │  │  :10000-20000 → 10.100.0.2 (RTP)       │ │
#   │  │  :5038 → 10.100.0.2:5038 (AMI)         │ │
#   │  └─────────────────────────────────────────┘ │
#   └──────┬──────────────────────┬────────────────┘
#          │ WireGuard            │ WireGuard
#          │ Encrypted Tunnel     │ Encrypted Tunnel
#          ▼                      ▼
#   ┌──────────────┐     ┌──────────────┐
#   │ Bangladesh   │     │ India        │
#   │ 10.100.0.2   │     │ 10.200.0.2   │
#   │ (No Real IP) │     │ (No Real IP) │
#   └──────────────┘     └──────────────┘
#
# ============================================================
#  SETUP STEPS ON OVH:
# ============================================================
#  1. apt-get install wireguard -y
#  2. wg genkey | tee /etc/wireguard/private.key | wg pubkey > /etc/wireguard/public.key
#  3. cat /etc/wireguard/private.key  → Put in <OVH_PRIVATE_KEY> below
#  4. cat /etc/wireguard/public.key   → Share with BD and IN clients
#  5. Get BD public key: from Bangladesh server
#  6. Get IN public key: from India server
#  7. Save this file as /etc/wireguard/wg0.conf
#  8. wg-quick up wg0 && systemctl enable wg-quick@wg0
#  9. Run iptables forwarding script
# ============================================================

[Interface]
# OVH Server Private Key (GENERATE YOURS: wg genkey)
PrivateKey = <OVH_PRIVATE_KEY>

# OVH WireGuard Internal IP
Address = 10.0.0.1/24

# WireGuard listen port (OPEN THIS PORT ON OVH FIREWALL!)
ListenPort = 51820

# Enable IP forwarding and NAT
PostUp = sysctl -w net.ipv4.ip_forward=1
PostUp = sysctl -w net.ipv6.conf.all.forwarding=1
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT
PostUp = iptables -A FORWARD -o wg0 -j ACCEPT
PostUp = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

# ──── Forward SIP Port 5080 to Bangladesh ────
PostUp = iptables -t nat -A PREROUTING -i eth0 -p udp --dport 5080 -j DNAT --to-destination 10.100.0.2:5080

# ──── Forward Port 5060 to India SBC ────
PostUp = iptables -t nat -A PREROUTING -i eth0 -p udp --dport 5060 -j DNAT --to-destination 10.200.0.2:5060

# ──── Forward RTP Range to Bangladesh ────
PostUp = iptables -t nat -A PREROUTING -i eth0 -p udp --dport 10000:20000 -j DNAT --to-destination 10.100.0.2

# ──── Forward AMI Port ────
PostUp = iptables -t nat -A PREROUTING -i eth0 -p tcp --dport 5038 -j DNAT --to-destination 10.100.0.2:5038

# Cleanup on down
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT
PostDown = iptables -D FORWARD -o wg0 -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -t nat -D PREROUTING -i eth0 -p udp --dport 5080 -j DNAT --to-destination 10.100.0.2:5080
PostDown = iptables -t nat -D PREROUTING -i eth0 -p udp --dport 5060 -j DNAT --to-destination 10.200.0.2:5060
PostDown = iptables -t nat -D PREROUTING -i eth0 -p udp --dport 10000:20000 -j DNAT --to-destination 10.100.0.2
PostDown = iptables -t nat -D PREROUTING -i eth0 -p tcp --dport 5038 -j DNAT --to-destination 10.100.0.2:5038

SaveConfig = true
MTU = 1420

# ───────────────────────────────────────────────────────────────
#  PEER 1: Bangladesh Client
# ───────────────────────────────────────────────────────────────
[Peer]
# Bangladesh Office WireGuard Client
# Must provide their public key to you
PublicKey = <BD_CLIENT_PUBLIC_KEY>

# Only allow BD client IP and their subnet
AllowedIPs = 10.100.0.2/32, 10.100.0.0/24

# Keep tunnel alive behind NAT
PersistentKeepalive = 25

# ───────────────────────────────────────────────────────────────
#  PEER 2: India Client
# ───────────────────────────────────────────────────────────────
[Peer]
# India Office WireGuard Client
# Must provide their public key to you
PublicKey = <IN_CLIENT_PUBLIC_KEY>

# Only allow IN client IP and their subnet
AllowedIPs = 10.200.0.2/32, 10.200.0.0/24

# Keep tunnel alive behind NAT
PersistentKeepalive = 25
